<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Audit Logs — CCS Faculty Requirement System</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" href="../../shared/global.css"/>
    <link rel="stylesheet" href="../resc/css/faculty-specific.css"/>
    <link rel="stylesheet" href="../resc/css/notification-bell.css"/>
    <link rel="stylesheet" href="../resc/css/admin-category-management.css"/>
    <link rel="stylesheet" href="../resc/css/admin-audit-logs.css"/>
</head>
<body>

<div id="header-container"></div>
<div id="sidebar-container"></div>

<main class="main-content">

    <div class="page-header anim anim-1">
        <div>
            <h1>Audit Logs</h1>
            <p>Track every admin and faculty action in the system</p>
        </div>
    </div>

    <!-- Stat Cards -->
    <div class="stat-cards anim anim-2">
        <div class="stat-card white">
            <div class="stat-label">Total Actions</div>
            <div class="stat-value" id="statTotal">0</div>
        </div>
        <div class="stat-card green">
            <div class="stat-label">Creates</div>
            <div class="stat-value" id="statCreates">0</div>
        </div>
        <div class="stat-card blue">
            <div class="stat-label">Updates</div>
            <div class="stat-value" id="statUpdates">0</div>
        </div>
        <div class="stat-card red">
            <div class="stat-label">Deletes</div>
            <div class="stat-value" id="statDeletes">0</div>
        </div>
    </div>

    <div class="panel anim anim-3">
        <div class="toolbar">
            <div class="toolbar-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                </svg>
                Activity Log
            </div>
            <div class="toolbar-right">
                <div class="search-box">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" id="searchLogs" placeholder="Search by action or record name..."/>
                </div>

                <!-- Action filter — now includes LOGIN + submission events -->
                <select class="filter-select" id="filterAction">
                    <option value="all">All Actions</option>
                    <optgroup label="Sessions">
                        <option value="LOGIN">Login</option>
                    </optgroup>
                    <optgroup label="Categories">
                        <option value="CREATE_CATEGORY">Create Category</option>
                        <option value="UPDATE_CATEGORY">Update Category</option>
                        <option value="TOGGLE_CATEGORY_STATUS">Toggle Status</option>
                        <option value="DELETE_CATEGORY">Delete Category</option>
                    </optgroup>
                    <optgroup label="Requirements">
                        <option value="CREATE_REQUIREMENT">Create Requirement</option>
                        <option value="UPDATE_REQUIREMENT">Update Requirement</option>
                        <option value="DELETE_REQUIREMENT">Delete Requirement</option>
                    </optgroup>
                    <optgroup label="Submissions">
                        <option value="SUBMIT_FILE">Submit File</option>
                        <option value="DELETE_SUBMISSION">Delete Submission</option>
                        <option value="APPROVE_SUBMISSION">Approve Submission</option>
                        <option value="REJECT_SUBMISSION">Reject Submission</option>
                    </optgroup>
                </select>

                <!-- Table filter — now includes professors + admins -->
                <select class="filter-select" id="filterTable">
                    <option value="all">All Tables</option>
                    <option value="admins">Admins</option>
                    <option value="professors">Professors</option>
                    <option value="categories">Categories</option>
                    <option value="requirements">Requirements</option>
                    <option value="submissions">Submissions</option>
                </select>

                <input type="date" class="filter-select" id="filterDate" title="Filter by date"/>
            </div>
        </div>

        <table class="data-table" id="auditTable">
            <thead>
                <tr>
                    <th>When</th>
                    <th>Action</th>
                    <th>Record</th>
                    <th>Table</th>
                    <th>Changes</th>
                </tr>
            </thead>
            <tbody id="auditTableBody">
                <!-- Rows injected by JS -->
            </tbody>
        </table>

        <div id="emptyState" class="empty-state" style="display:none;">
            <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            <h3>No Audit Logs Yet</h3>
            <p>Admin and faculty actions will appear here</p>
        </div>

        <div class="pagination-bar" id="paginationBar"></div>
    </div>

</main>

<!-- Diff Modal -->
<div id="diffModal" class="modal-overlay" style="display:none;">
    <div class="modal-dialog" style="max-width: 640px;">
        <div class="modal-header">
            <h3 id="diffModalTitle">Change Details</h3>
            <button class="modal-close" onclick="closeDiffModal()">
                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="diff-container" id="diffContainer"></div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn-secondary" onclick="closeDiffModal()">Close</button>
        </div>
    </div>
</div>

<button class="help-btn">?</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../config/.env.js"></script>
<script src="../../config/config.js"></script>
<script src="../../shared/global.js"></script>
<script src="../resc/js/notification-service.js"></script>
<script src="../resc/js/notification-bell.js"></script>
<script src="../resc/js/faculty-specific.js"></script>
<script src="includes/sidebar.js"></script>
<script src="../resc/js/admin-audit-logs.js"></script>
<script>
    loadHeader();
    loadSidebar('admin-audit-logs');
    
    // Initialize notification bell after header is rendered
    setTimeout(() => {
        if (typeof NotificationBell !== 'undefined') {
            const container = document.getElementById('notificationBellContainer');
            if (container) {
                window.notificationBellInstance = new NotificationBell({
                    containerId: 'notificationBellContainer',
                    maxNotifications: 10
                });
            }
        }
    }, 100);
</script>

</body>
</html>
