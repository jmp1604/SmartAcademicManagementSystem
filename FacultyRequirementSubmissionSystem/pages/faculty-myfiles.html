<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Files — CCS Faculty Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../../shared/global.css"/>
    <link rel="stylesheet" href="../resc/css/faculty-specific.css"/>
</head>
<body>

<div id="header-container"></div>

<div id="sidebar-container"></div>

<main class="main-content">

    <div class="page-header anim anim-1">
        <h1>My Files</h1>
        <p>View all your uploaded files and their approval status</p>
    </div>

    <div class="stat-cards four-col anim anim-2">
        <div class="stat-card green">
            <div class="stat-label">Total Uploads</div>
            <div class="stat-value" id="myfiles-total">0</div>
        </div>
        <div class="stat-card teal">
            <div class="stat-label">Approved</div>
            <div class="stat-value" id="myfiles-approved">0</div>
        </div>
        <div class="stat-card orange">
            <div class="stat-label">Pending</div>
            <div class="stat-value" id="myfiles-pending">0</div>
        </div>
        <div class="stat-card red">
            <div class="stat-label">Rejected</div>
            <div class="stat-value" id="myfiles-rejected">0</div>
        </div>
    </div>

    <div class="filter-bar anim anim-3">
        <div class="filter-bar-title">
            <svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            Filter Files
        </div>
        <div class="filter-row">
            <div class="search-box">
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" class="files-search" placeholder="Search files…"/>
            </div>
            <div class="select-wrap">
                <select class="cat-filter">
                    <option value="all categories">All Categories</option>
                    <option value="syllabus">Syllabus</option>
                    <option value="grade sheets">Grade Sheets</option>
                    <option value="lecture notes">Lecture Notes</option>
                    <option value="attendance records">Attendance Records</option>
                    <option value="assessment tools">Assessment Tools</option>
                    <option value="research papers">Research Papers</option>
                </select>
                <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="select-wrap">
                <select class="status-filter">
                    <option value="all status">All Status</option>
                    <option value="approved">Approved</option>
                    <option value="pending">Pending</option>
                    <option value="rejected">Rejected</option>
                </select>
                <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
        </div>
    </div>

    <div class="files-grid anim anim-4" id="files-grid">
        <!-- Files will be loaded dynamically -->
    </div>

</main>

<button class="help-btn">?</button>

<div id="file-preview-modal" class="preview-modal">
    <div class="preview-modal-overlay"></div>
    <div class="preview-modal-content">
        <div class="preview-modal-header">
            <div class="preview-modal-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
                <span id="preview-file-name">File Preview</span>
            </div>
            <button class="preview-modal-close" id="close-preview-modal" title="Close (ESC)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <div class="preview-modal-body">
            <iframe id="preview-iframe" frameborder="0"></iframe>
            <div id="preview-loading" class="preview-loading">
                <div class="preview-spinner"></div>
                <p>Loading file...</p>
            </div>
            <div id="preview-error" class="preview-error" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <p>Unable to preview this file type</p>
                <button id="preview-download-instead" class="preview-download-btn">Download Instead</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../config/.env.js"></script>
<script src="../../config/config.js"></script>
<script src="../../shared/global.js"></script>
<script src="includes/sidebar.js"></script>
<script src="../resc/js/faculty-specific.js"></script>
<script src="../resc/js/faculty-myfiles.js"></script>
<script>
loadHeader();
loadSidebar('faculty-myfiles');
</script>
</body>
</html>
