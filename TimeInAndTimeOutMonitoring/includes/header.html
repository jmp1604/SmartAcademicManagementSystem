<header>
    <div class="top-left">
        <div class="top-left-logos">
            <img src="../resc/assets/plp_logo.png" alt="PLP Logo">
            <img src="../resc/assets/ccs_logo.png" alt="CCS Logo">
        </div>
        <div class="top-left-divider"></div>
        <div class="top-left-text">
            <h2>Laboratory Attendance System</h2>
            <p>Admin Panel</p>
        </div>
    </div>

    <div class="header-time">
        <span class="time-display" id="manilaTime">--:--:--</span>
        <div class="time-meta">
            <i class="fa-regular fa-calendar"></i>
            <span id="manilaDate">--- --, ----</span>
        </div>
    </div>

    <div class="header-right">
        <button class="header-logout" onclick="logout()">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out
        </button>
    </div>
